version: '3.8'

services:
  mysql-creditCore:
    image: mysql:8.0
    container_name: mysql-creditCore
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: creditcore
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: